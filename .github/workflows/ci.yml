name: CI

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
  CONFIGURATION: Release

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore FriendlyExcel.sln

      - name: Build
        run: dotnet build FriendlyExcel.sln -c ${{ env.CONFIGURATION }} --no-restore

      - name: Test
        run: >
          dotnet test FriendlyExcel.sln
          -c ${{ env.CONFIGURATION }}
          --no-build
          --logger trx
          --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/
          retention-days: 14

  pack:
    name: Pack NuGet
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Pack
        run: >
          dotnet pack FriendlyExcel/FriendlyExcel.csproj
          -c ${{ env.CONFIGURATION }}
          -o artifacts/nuget
          /p:PackageProjectUrl=https://github.com/${{ github.repository }}
          /p:RepositoryUrl=https://github.com/${{ github.repository }}.git
          /p:RepositoryType=git

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget
          path: |
            artifacts/nuget/*.nupkg
            artifacts/nuget/*.snupkg
          retention-days: 30

  # Optional: GitHub CodeQL (C#). Continues on error so missing permissions
  # don't fail the main pipeline on forks.
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build for CodeQL
        run: |
          dotnet restore FriendlyExcel.sln
          dotnet build FriendlyExcel.sln -c Release --no-restore

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
